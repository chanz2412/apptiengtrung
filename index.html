<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luyện Phát Âm Tiếng Trung</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f7fc;
    padding:20px;
    max-width:700px;
    margin:auto;
}

.container{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    color:#d32f2f;
}

textarea{
    width:100%;
    height:100px;
    padding:10px;
    font-size:20px;
}

button{
    margin:10px 5px;
    padding:12px 20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
}

.listen{
    background:#2196f3;
    color:white;
}

.record{
    background:#4caf50;
    color:white;
}

.stop{
    background:#f44336;
    color:white;
}

.result{
    margin-top:20px;
    padding:15px;
    background:#f5f5f5;
    border-radius:10px;
}

.score{
    font-size:24px;
    font-weight:bold;
    color:#4caf50;
}
</style>
</head>
<body>

<div class="container">
    <h1>🇨🇳 Luyện Phát Âm Tiếng Trung</h1>

    <label>Nhập từ hoặc câu tiếng Trung:</label>

    <textarea id="targetText">你好，我是学生。</textarea>

    <br>

    <button class="listen" onclick="speakChinese()">
        🔊 Nghe mẫu
    </button>

    <button class="record" onclick="startRecognition()">
        🎤 Bắt đầu đọc
    </button>

    <button class="stop" onclick="stopRecognition()">
        ⏹ Dừng
    </button>

    <div class="result">
        <h3>Kết quả nhận diện:</h3>
        <p id="recognized">Chưa có dữ liệu</p>

        <h3>Độ chính xác:</h3>
        <div class="score" id="score">0%</div>
    </div>
</div>

<script>

function speakChinese(){

    let text = document.getElementById("targetText").value;

    const utterance = new SpeechSynthesisUtterance(text);

    utterance.lang = "zh-CN";
    utterance.rate = 0.9;

    speechSynthesis.speak(utterance);
}

let recognition;

if ('webkitSpeechRecognition' in window){

    recognition = new webkitSpeechRecognition();

    recognition.lang = 'zh-CN';

    recognition.continuous = false;

    recognition.interimResults = false;

    recognition.onresult = function(event){

        const spoken =
        event.results[0][0].transcript;

        document.getElementById("recognized").innerText =
        spoken;

        calculateScore(
            document.getElementById("targetText").value,
            spoken
        );
    };

    recognition.onerror = function(event){
        alert("Lỗi nhận diện: " + event.error);
    };

}else{
    alert("Trình duyệt không hỗ trợ nhận diện giọng nói.");
}

function startRecognition(){
    recognition.start();
}

function stopRecognition(){
    recognition.stop();
}

function calculateScore(target, spoken){

    target = target.replace(/\s/g,'');
    spoken = spoken.replace(/\s/g,'');

    let same = 0;

    let minLength =
    Math.min(target.length, spoken.length);

    for(let i=0;i<minLength;i++){

        if(target[i] === spoken[i]){
            same++;
        }
    }

    let score =
    Math.round((same/target.length)*100);

    document.getElementById("score").innerText =
    score + "%";
}

</script>

</body>
</html>
